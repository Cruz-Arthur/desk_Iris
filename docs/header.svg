<svg width="900" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B0E13"/>
      <stop offset="100%" stop-color="#121823"/>
    </linearGradient>
    <radialGradient id="ap-fill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1D2632"/>
      <stop offset="65%" stop-color="#151B24"/>
      <stop offset="100%" stop-color="#222C39"/>
    </radialGradient>
    <radialGradient id="ap-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB454" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFB454" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scan-h" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FFB454" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#FFB454" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#FFB454" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#FFB454" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFB454" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow-a" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-txt" x="-40%" y="-120%" width="180%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
    </filter>
    <clipPath id="clip">
      <rect width="900" height="400" rx="6"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- ── BACKGROUND ── -->
    <rect width="900" height="400" fill="url(#bg)"/>

    <!-- Subtle grid -->
    <g stroke="#EAF0F6" stroke-width="0.3" opacity="0.04">
      <line x1="75"  y1="0" x2="75"  y2="400"/><line x1="150" y1="0" x2="150" y2="400"/>
      <line x1="225" y1="0" x2="225" y2="400"/><line x1="300" y1="0" x2="300" y2="400"/>
      <line x1="375" y1="0" x2="375" y2="400"/><line x1="450" y1="0" x2="450" y2="400"/>
      <line x1="525" y1="0" x2="525" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
      <line x1="675" y1="0" x2="675" y2="400"/><line x1="750" y1="0" x2="750" y2="400"/>
      <line x1="825" y1="0" x2="825" y2="400"/>
      <line x1="0" y1="80"  x2="900" y2="80"/><line x1="0" y1="160" x2="900" y2="160"/>
      <line x1="0" y1="240" x2="900" y2="240"/><line x1="0" y1="320" x2="900" y2="320"/>
    </g>

    <!-- ── STAR FIELD ── -->
    <!-- White stars -->
    <circle cx="42"  cy="28"  r="1.2" fill="#EAF0F6" opacity="0.7"><animateTransform attributeName="transform" type="translate" values="0,0;17,11;0,0" dur="27s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;1;0.35;0.8;0.7" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="42"  cy="28"  r="3"   fill="#EAF0F6" opacity="0.12" filter="url(#soft)"><animateTransform attributeName="transform" type="translate" values="0,0;17,11;0,0" dur="27s" repeatCount="indefinite"/></circle>

    <circle cx="118" cy="72"  r="0.8" fill="#EAF0F6" opacity="0.5"><animateTransform attributeName="transform" type="translate" values="0,0;21,14;0,0" dur="34s" repeatCount="indefinite" begin="-10s"/><animate attributeName="opacity" values="0.5;0.9;0.3;0.6;0.5" dur="9s" repeatCount="indefinite"/></circle>

    <circle cx="198" cy="19"  r="1.5" fill="#EAF0F6" opacity="0.6"><animateTransform attributeName="transform" type="translate" values="0,0;14,9;0,0" dur="22s" repeatCount="indefinite" begin="-4s"/><animate attributeName="opacity" values="0.6;1;0.45;0.6" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="198" cy="19"  r="3.5" fill="#EAF0F6" opacity="0.1" filter="url(#soft)"><animateTransform attributeName="transform" type="translate" values="0,0;14,9;0,0" dur="22s" repeatCount="indefinite" begin="-4s"/></circle>

    <circle cx="308" cy="53"  r="1.0" fill="#EAF0F6" opacity="0.4"><animateTransform attributeName="transform" type="translate" values="0,0;24,16;0,0" dur="39s" repeatCount="indefinite" begin="-12s"/><animate attributeName="opacity" values="0.4;0.75;0.2;0.5;0.4" dur="11s" repeatCount="indefinite"/></circle>

    <circle cx="548" cy="24"  r="1.1" fill="#EAF0F6" opacity="0.65"><animateTransform attributeName="transform" type="translate" values="0,0;19,13;0,0" dur="30s" repeatCount="indefinite" begin="-15s"/><animate attributeName="opacity" values="0.65;1;0.4;0.7;0.65" dur="6s" repeatCount="indefinite"/></circle>

    <circle cx="678" cy="48"  r="0.9" fill="#EAF0F6" opacity="0.45"><animateTransform attributeName="transform" type="translate" values="0,0;16,11;0,0" dur="32s" repeatCount="indefinite" begin="-3s"/></circle>

    <circle cx="856" cy="68"  r="1.2" fill="#EAF0F6" opacity="0.55"><animateTransform attributeName="transform" type="translate" values="0,0;15,10;0,0" dur="24s" repeatCount="indefinite" begin="-8s"/><animate attributeName="opacity" values="0.55;0.95;0.35;0.7;0.55" dur="7s" repeatCount="indefinite"/></circle>

    <circle cx="28"  cy="138" r="1.6" fill="#EAF0F6" opacity="0.5"><animateTransform attributeName="transform" type="translate" values="0,0;20,13;0,0" dur="37s" repeatCount="indefinite" begin="-6s"/><animate attributeName="opacity" values="0.5;0.9;0.35;0.65;0.5" dur="8s" repeatCount="indefinite"/></circle>

    <circle cx="88"  cy="188" r="0.7" fill="#EAF0F6" opacity="0.35"><animateTransform attributeName="transform" type="translate" values="0,0;23,15;0,0" dur="44s" repeatCount="indefinite" begin="-18s"/></circle>

    <circle cx="148" cy="158" r="1.3" fill="#EAF0F6" opacity="0.5"><animateTransform attributeName="transform" type="translate" values="0,0;18,12;0,0" dur="33s" repeatCount="indefinite" begin="-11s"/><animate attributeName="opacity" values="0.5;0.88;0.32;0.6;0.5" dur="9s" repeatCount="indefinite"/></circle>

    <circle cx="218" cy="128" r="2.0" fill="#EAF0F6" opacity="0.28"><animateTransform attributeName="transform" type="translate" values="0,0;11,7;0,0" dur="48s" repeatCount="indefinite" begin="-29s"/><animate attributeName="opacity" values="0.28;0.55;0.15;0.35;0.28" dur="12s" repeatCount="indefinite"/></circle>

    <circle cx="697" cy="138" r="1.0" fill="#EAF0F6" opacity="0.6"><animateTransform attributeName="transform" type="translate" values="0,0;17,11;0,0" dur="26s" repeatCount="indefinite" begin="-7s"/><animate attributeName="opacity" values="0.6;1;0.42;0.73;0.6" dur="6.5s" repeatCount="indefinite"/></circle>

    <circle cx="787" cy="158" r="1.7" fill="#EAF0F6" opacity="0.42"><animateTransform attributeName="transform" type="translate" values="0,0;12,8;0,0" dur="36s" repeatCount="indefinite" begin="-14s"/><animate attributeName="opacity" values="0.42;0.8;0.28;0.52;0.42" dur="7.5s" repeatCount="indefinite"/></circle>

    <circle cx="818" cy="308" r="0.9" fill="#EAF0F6" opacity="0.48"><animateTransform attributeName="transform" type="translate" values="0,0;14,9;0,0" dur="28s" repeatCount="indefinite" begin="-1s"/><animate attributeName="opacity" values="0.48;0.85;0.3;0.58;0.48" dur="8.5s" repeatCount="indefinite"/></circle>

    <circle cx="758" cy="348" r="1.4" fill="#EAF0F6" opacity="0.38"><animateTransform attributeName="transform" type="translate" values="0,0;21,14;0,0" dur="41s" repeatCount="indefinite" begin="-16s"/></circle>

    <circle cx="58"  cy="348" r="1.5" fill="#EAF0F6" opacity="0.43"><animateTransform attributeName="transform" type="translate" values="0,0;19,13;0,0" dur="36s" repeatCount="indefinite" begin="-17s"/><animate attributeName="opacity" values="0.43;0.78;0.28;0.53;0.43" dur="9.5s" repeatCount="indefinite"/></circle>

    <circle cx="178" cy="338" r="0.8" fill="#EAF0F6" opacity="0.38"><animateTransform attributeName="transform" type="translate" values="0,0;13,9;0,0" dur="29s" repeatCount="indefinite" begin="-13s"/></circle>

    <circle cx="258" cy="298" r="1.2" fill="#EAF0F6" opacity="0.52"><animateTransform attributeName="transform" type="translate" values="0,0;22,15;0,0" dur="43s" repeatCount="indefinite" begin="-25s"/><animate attributeName="opacity" values="0.52;0.9;0.37;0.62;0.52" dur="10s" repeatCount="indefinite"/></circle>

    <circle cx="318" cy="358" r="1.5" fill="#EAF0F6" opacity="0.33"><animateTransform attributeName="transform" type="translate" values="0,0;15,10;0,0" dur="25s" repeatCount="indefinite" begin="-8s"/></circle>

    <circle cx="698" cy="318" r="0.9" fill="#EAF0F6" opacity="0.48"><animateTransform attributeName="transform" type="translate" values="0,0;20,13;0,0" dur="38s" repeatCount="indefinite" begin="-5s"/></circle>

    <circle cx="78"  cy="248" r="1.1" fill="#EAF0F6" opacity="0.38"><animateTransform attributeName="transform" type="translate" values="0,0;16,11;0,0" dur="26s" repeatCount="indefinite" begin="-21s"/></circle>

    <!-- Amber accent stars -->
    <circle cx="378" cy="33"  r="1.3" fill="#FFB454" opacity="0.45"><animateTransform attributeName="transform" type="translate" values="0,0;11,7;0,0" dur="24s" repeatCount="indefinite" begin="-8s"/><animate attributeName="opacity" values="0.45;0.85;0.28;0.55;0.45" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="378" cy="33"  r="3.5" fill="#FFB454" opacity="0.08" filter="url(#soft)"><animateTransform attributeName="transform" type="translate" values="0,0;11,7;0,0" dur="24s" repeatCount="indefinite" begin="-8s"/></circle>

    <circle cx="778" cy="28"  r="1.4" fill="#FFB454" opacity="0.38"><animateTransform attributeName="transform" type="translate" values="0,0;13,9;0,0" dur="26s" repeatCount="indefinite" begin="-20s"/><animate attributeName="opacity" values="0.38;0.72;0.22;0.48;0.38" dur="7s" repeatCount="indefinite"/></circle>

    <circle cx="848" cy="218" r="1.2" fill="#FFB454" opacity="0.38"><animateTransform attributeName="transform" type="translate" values="0,0;19,12;0,0" dur="30s" repeatCount="indefinite" begin="-22s"/></circle>

    <circle cx="618" cy="358" r="1.3" fill="#FFB454" opacity="0.42"><animateTransform attributeName="transform" type="translate" values="0,0;17,11;0,0" dur="31s" repeatCount="indefinite" begin="-19s"/><animate attributeName="opacity" values="0.42;0.78;0.25;0.52;0.42" dur="7s" repeatCount="indefinite"/></circle>

    <!-- Green accent stars -->
    <circle cx="98"  cy="318" r="1.1" fill="#4ADE80" opacity="0.3"><animateTransform attributeName="transform" type="translate" values="0,0;15,10;0,0" dur="28s" repeatCount="indefinite" begin="-4s"/><animate attributeName="opacity" values="0.3;0.55;0.18;0.38;0.3" dur="12s" repeatCount="indefinite"/></circle>
    <circle cx="878" cy="338" r="1.0" fill="#4ADE80" opacity="0.28"><animateTransform attributeName="transform" type="translate" values="0,0;16,11;0,0" dur="33s" repeatCount="indefinite" begin="-10s"/></circle>

    <!-- Constellation lines -->
    <line x1="42" y1="28" x2="118" y2="72" stroke="#FFB454" stroke-width="0.5" opacity="0"><animate attributeName="opacity" values="0;0.14;0;0;0" dur="14s" repeatCount="indefinite" begin="-2s"/></line>
    <line x1="118" y1="72" x2="198" y2="19" stroke="#FFB454" stroke-width="0.5" opacity="0"><animate attributeName="opacity" values="0;0;0.1;0;0" dur="17s" repeatCount="indefinite" begin="-6s"/></line>
    <line x1="697" y1="138" x2="787" y2="158" stroke="#FFB454" stroke-width="0.5" opacity="0"><animate attributeName="opacity" values="0;0.09;0;0.07;0" dur="19s" repeatCount="indefinite" begin="-9s"/></line>

    <!-- ── APERTURE AMBIENT GLOW ── -->
    <circle cx="450" cy="178" r="115" fill="url(#ap-glow)">
      <animate attributeName="r"       values="115;130;115" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      <animate attributeName="opacity" values="0.8;1;0.8"   dur="3.2s" repeatCount="indefinite"/>
    </circle>

    <!-- ── APERTURE DISK ── -->
    <circle cx="450" cy="178" r="78" fill="url(#ap-fill)" stroke="#222C39" stroke-width="1.5"/>
    <circle cx="450" cy="178" r="78" fill="none" stroke="#32404F" stroke-width="0.5"/>
    <circle cx="450" cy="178" r="71" fill="none" stroke="#32404F" stroke-width="0.3" opacity="0.4"/>

    <!-- 7 blade seams (rotating) – angles: 0, 51.4, 102.9, 154.3, 205.7, 257.1, 308.6 deg -->
    <!-- endpoints at r=76: (0,-76),(59,-47),(74,17),(27,72),(-27,72),(-74,17),(-59,-47) -->
    <g transform="translate(450,178)">
      <line x1="0" y1="0" x2="0"   y2="-76" stroke="#0B0E13" stroke-width="1.8" opacity="0.9"/>
      <line x1="0" y1="0" x2="59"  y2="-47" stroke="#0B0E13" stroke-width="1.8" opacity="0.9"/>
      <line x1="0" y1="0" x2="74"  y2="17"  stroke="#0B0E13" stroke-width="1.8" opacity="0.9"/>
      <line x1="0" y1="0" x2="27"  y2="72"  stroke="#0B0E13" stroke-width="1.8" opacity="0.9"/>
      <line x1="0" y1="0" x2="-27" y2="72"  stroke="#0B0E13" stroke-width="1.8" opacity="0.9"/>
      <line x1="0" y1="0" x2="-74" y2="17"  stroke="#0B0E13" stroke-width="1.8" opacity="0.9"/>
      <line x1="0" y1="0" x2="-59" y2="-47" stroke="#0B0E13" stroke-width="1.8" opacity="0.9"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="16s" repeatCount="indefinite" additive="sum"/>
    </g>

    <!-- ── APERTURE HOLE (breathing) ── -->
    <circle cx="450" cy="178" r="26" fill="#0B0E13">
      <animate attributeName="r" values="20;36;20" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    </circle>

    <!-- Amber inner ring -->
    <circle cx="450" cy="178" r="26" fill="none" stroke="#FFB454" stroke-width="1.4" filter="url(#glow-a)">
      <animate attributeName="r"       values="20;36;20"   dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      <animate attributeName="opacity" values="0.65;1;0.65" dur="3.2s" repeatCount="indefinite"/>
    </circle>

    <!-- ── SCANNING LINE ── -->
    <rect x="322" y="108" width="256" height="2.5" fill="url(#scan-h)" opacity="0.85">
      <animate attributeName="y"       values="108;248;108" dur="3.6s" repeatCount="indefinite" calcMode="linear"/>
      <animate attributeName="opacity" values="0.85;0.5;0.85" dur="3.6s" repeatCount="indefinite"/>
    </rect>

    <!-- ── VIEWFINDER BRACKETS (aperture area) ── -->
    <g stroke="#FFB454" stroke-width="1.8" fill="none">
      <path d="M322,108 L322,126 M322,108 L340,108"/>
      <path d="M578,108 L578,126 M578,108 L560,108"/>
      <path d="M322,248 L322,230 M322,248 L340,248"/>
      <path d="M578,248 L578,230 M578,248 L560,248"/>
      <animate attributeName="opacity" values="0.8;1;0.55;0.8" dur="3.6s" repeatCount="indefinite"/>
    </g>

    <!-- ── IRIS TEXT ── -->
    <!-- Glow layer -->
    <text x="450" y="308"
      font-family="'Bahnschrift','Segoe UI','Arial Narrow',Arial,sans-serif"
      font-size="48" font-weight="700" letter-spacing="18"
      fill="#FFB454" opacity="0.22" text-anchor="middle"
      filter="url(#glow-txt)">IRIS</text>
    <!-- Main text -->
    <text x="450" y="308"
      font-family="'Bahnschrift','Segoe UI','Arial Narrow',Arial,sans-serif"
      font-size="48" font-weight="700" letter-spacing="18"
      fill="#EAF0F6" text-anchor="middle">IRIS</text>

    <!-- Subtitle -->
    <text x="450" y="332"
      font-family="'Bahnschrift','Segoe UI','Arial Narrow',Arial,sans-serif"
      font-size="9.5" font-weight="400" letter-spacing="4.5"
      fill="#8FA8BF" text-anchor="middle" opacity="0.75">ESTAÇÃO DE LEITURA ÓPTICA</text>

    <!-- Thin separator line below subtitle -->
    <line x1="370" y1="344" x2="530" y2="344" stroke="#32404F" stroke-width="0.6" opacity="0.6"/>

    <!-- Bottom tagline -->
    <text x="450" y="370"
      font-family="'Bahnschrift','Segoe UI','Arial Narrow',Arial,sans-serif"
      font-size="8" letter-spacing="3" fill="#8FA8BF" text-anchor="middle" opacity="0.4">IRIS · SYSTEMS</text>

    <!-- ── CORNER MARKS (outer banner) ── -->
    <g stroke="#FFB454" stroke-width="1" fill="none" opacity="0.3">
      <path d="M16,16 L16,30 M16,16 L30,16"/>
      <path d="M884,16 L884,30 M884,16 L870,16"/>
      <path d="M16,384 L16,370 M16,384 L30,384"/>
      <path d="M884,384 L884,370 M884,384 L870,384"/>
    </g>

    <!-- Top-right label -->
    <text x="880" y="14"
      font-family="'Bahnschrift','Segoe UI','Arial Narrow',Arial,sans-serif"
      font-size="7.5" letter-spacing="2" fill="#8FA8BF" text-anchor="end" opacity="0.35">OPTICAL READING STATION</text>

    <!-- ── EDGE ACCENTS ── -->
    <!-- Left edge amber line -->
    <rect x="0" y="0" width="2" height="400" fill="#FFB454" opacity="0.25"/>
    <!-- Bottom edge amber line -->
    <rect x="0" y="397" width="900" height="3" fill="#FFB454" opacity="0.35"/>
    <rect x="0" y="399" width="900" height="1" fill="#FFB454" opacity="0.55"/>

  </g>
</svg>
